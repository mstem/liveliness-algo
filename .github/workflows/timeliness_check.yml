name: Timeliness Check

on:
  schedule:
    - cron: '0 9 * * *'  # every day at 09:00 UTC
  workflow_dispatch:         # also allows manual trigger from GitHub UI

concurrency:
  group: timeliness-check
  cancel-in-progress: false  # wait for current run to finish, don't overlap

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15      # kill if a run stalls (shouldn't exceed ~10 min for 20 projects)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run timeliness check
        env:
          AIRTABLE_PAT:    ${{ secrets.AIRTABLE_PAT }}
          GITHUB_TOKEN:    ${{ secrets.GH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python timeliness_check.py
